server:
  port: 9090
swagger:
  mock-api-url: http://${WIRE_MOCK_HOST}:9098
wiremock:
  port: 9098
  host: localhost
statscore:
  client: ${STATSCORE_CLIENT}
  secret: ${STATSCORE_SECRET}

spring:
  application:
    name: flexbets-sport
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    enabled: true
    schemas: sport
    locations: classpath:db/migration
  docker:
    compose:
      enabled: false
  jackson:
    property-naming-strategy: SNAKE_CASE
  profiles:
    active: mock
scheduler:
  mock-live-update-interval: 30000

logging:
  level:
    org.flywaydb.core: DEBUG
