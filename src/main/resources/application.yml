server:
  port: 9090
swagger:
  mock-api-url: http://${WIRE_MOCK_HOST}:9098
wiremock:
  port: 9098
  host: localhost
statscore:
  client: ${STATSCORE_CLIENT}
  secret: ${STATSCORE_SECRET}
convert:
  imperial: true

spring:
  application:
    name: flexbets-sport
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  flyway:
    enabled: true
    schemas: sport
    locations: classpath:db/migration
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false
  docker:
    compose:
      enabled: false
  jackson:
    property-naming-strategy: SNAKE_CASE
  profiles:
    active: mock
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

scheduler:
  mock-live-update-interval: 30000

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web.reactive.function.client.ExchangeFunctions: DEBUG
    reactor.netty.http.client: DEBUG

trade360:
  username: ${LSPORTS_USERNAME}
  password: ${LSPORTS_PASSWORD}
  prematch-package-id: ${LSPORTS_PREMATCH_PACKAGE_ID:2463}
  inplay-package-id: ${LSPORTS_INPLAY_PACKAGE_ID:2464}

sportsdata:
  base-url: https://api.sportsdata.io/v3/mlb/scores/json
  key: ${SPORTSDATA_API_KEY}