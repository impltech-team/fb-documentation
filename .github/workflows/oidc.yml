name: Deploy to AWS ECS

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2

jobs:
  assume-role:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}