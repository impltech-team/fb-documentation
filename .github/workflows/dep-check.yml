name: Dependency Check

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Dependency-Check NVD database
        uses: actions/cache@v4
        with:
          path: dependency-check/data
          key: dependency-check-nvd-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            dependency-check-nvd-${{ runner.os }}-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Dependency check
        id: dependency-check
        continue-on-error: true
        run: |
          VERSION=$(curl -s https://dependency-check.github.io/DependencyCheck/current.txt) && \
          curl -Ls "https://github.com/dependency-check/DependencyCheck/releases/download/v$VERSION/dependency-check-$VERSION-release.zip" --output dependency-check.zip && \
          unzip dependency-check.zip && \
          dependency-check/bin/dependency-check.sh \
            --out . \
            --scan ~/.gradle/caches \
            --format JSON \
            --prettyPrint

      - name: Upload dependency check report
        if: ${{ steps.dependency-check.outcome != 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ./*.json
