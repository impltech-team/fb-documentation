name: CodeQL

on:
  push:
    branches: [feat/ci-docker]
  # pull_request:
  #   branches: [main]
  #   types: [opened]
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "java"

      - name: Build .jar
        run: |
          chmod +x gradlew
          ./gradlew dependencies --no-daemon
          ./gradlew build -x test --no-daemon

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3
