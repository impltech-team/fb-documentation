name: Deploy to AWS ECS

on:
  push:
    # branches:
    #   - main
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: flexbets-dev
  ECS_CLUSTER: dev-cluster
  ECS_SERVICE: dev-service
  ECS_TASK: mock-api

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=${GITHUB_SHA::7}
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        env:
          IMAGE_TAG: ${{ env.COMMIT_SHORT_SHA }}
          IMAGE_TAG_RESULT: ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG .
          docker image list
          docker push ${{ env.IMAGE_TAG_RESULT }}

      - name: Retrieve latest ECS task definition
        id: get-task-def
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK }}-task \
            --query taskDefinition > task-definition.json

      - name: Update ECS Task Definition with jq
        run: |
          jq '.containerDefinitions[0].image = "${{ env.IMAGE_TAG_RESULT }}"' task-definition.json | tee task-definition.json


      - name: Check updated ECS Task Definition
        id: get-task-def-updated
        run: |
          cat task.definition.json
