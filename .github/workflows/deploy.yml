name: Deploy to ECS

on:
  push:
    branches: [feat/ci-docker]
  pull_request:
    branches: [main]
    types: [opened]
  workflow_dispatch:

jobs:
  build-app:
    name: Build application
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag_result: ${{ steps.build-and-push.outputs.image_tag_result }}
    env:
      ecr_repository: flexbets
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Dependency-Check NVD database
        uses: actions/cache@v4
        with:
          path: dependency-check/data
          key: dependency-check-nvd-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            dependency-check-nvd-${{ runner.os }}-

      - name: Build .jar
        run: |
          chmod +x gradlew
          ./gradlew dependencies --no-daemon
          ./gradlew build -x test --no-daemon

      - name: Dependency check
        id: dependency-check
        timeout-minutes: 3
        continue-on-error: true
        run: |
          VERSION=$(curl -s https://dependency-check.github.io/DependencyCheck/current.txt) && \
          curl -Ls "https://github.com/dependency-check/DependencyCheck/releases/download/v$VERSION/dependency-check-$VERSION-release.zip" --output dependency-check.zip && \
          unzip dependency-check.zip && \
          dependency-check/bin/dependency-check.sh \
            --out . \
            --scan ~/.gradle/caches \
            --format JSON \
            --prettyPrint

      - name: Upload dependency check report
        if: ${{ steps.dependency-check.outcome != 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ./*.json

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=${GITHUB_SHA::7}
          echo "commit_short_sha=$calculatedSha" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: ./.github/workflows/oidc
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        id: build-and-push
        env:
          image_tag: ${{ env.commit_short_sha }}
          image_tag_result: ${{ steps.login-ecr.outputs.registry }}/$ecr_repository:$image_tag
        run: |
          docker build . -t ${{ env.image_tag_result }}
          docker push ${{ env.image_tag_result }}
          echo "image_tag_result=${{ env.image_tag_result }}" >> $GITHUB_OUTPUT

  update-ecs:
      needs: [build-app]
      name: Update ECS Task (${{ matrix.env }})
      runs-on: ubuntu-latest
      permissions:
        id-token: write
        contents: read
      strategy:
        matrix:
          env: [dev,stage,prd]
      env:
        ecs_cluster: ${{ matrix.env }}
        ecs_service: ${{ matrix.env }}
        ecs_task: ${{ matrix.env }}-api
      steps:
        - run: echo ${{ matrix.env }}
        - uses: actions/checkout@v4
          id: checkout

        - name: Configure AWS credentials
          id: aws-credentials
          uses: ./.github/workflows/oidc
          with:
            role-to-assume: ${{ secrets.IAM_ROLE }}

        - name: Update ECS task definition
          id: task-def-update
          timeout-minutes: 3
          run: |
            aws ecs describe-task-definition --task-definition ${{ env.ecs_task }} \
              --query taskDefinition --output json > task-raw.json
            jq 'del(.compatibilities,
              .taskDefinitionArn,
              .requiresAttributes,
              .revision, .status,
              .registeredAt,
              .registeredBy)' \
              task-raw.json > task-clear.json
            jq '
            .containerDefinitions[0].image =
            "${{ needs.docker-image.outputs.image_tag_result }}"
            ' task-clear.json > task-definition.json

        - name: Deploy to ECS
          uses: aws-actions/amazon-ecs-deploy-task-definition@v1
          with:
            task-definition: task-definition.json
            cluster: ${{ env.ecs_cluster }}
            service: ${{ env.ecs_service }}
            wait-for-service-stability: true
